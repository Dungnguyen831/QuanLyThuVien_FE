<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm Độc giả - LMS Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="../../../../assets/css/admin/admin-style.css"
    />
    <link
      rel="stylesheet"
      href="../../../../assets/css/admin/reader-style.css"
    />
  </head>
  <body class="bg-light">
    <div class="d-flex" id="wrapper">
      <div id="sidebar-container"></div>
      <div id="page-content-wrapper" class="flex-grow-1">
        <div id="header-container"></div>

        <div class="container-fluid px-4 py-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center">
              <a
                href="reader.html"
                class="btn btn-sm btn-white border me-3 shadow-sm"
                ><i class="fas fa-chevron-left"></i
              ></a>
              <h4 class="fw-bold mb-0">Thêm Độc giả mới</h4>
            </div>
          </div>

          <div class="row justify-content-center">
            <div class="col-12">
              <div class="card card-custom">
                <div class="card-body p-4">
                  <form id="addReaderForm">
                    <div class="group-title fw-bold">
                      <i class="fas fa-user-tag me-2"></i>Thông tin cơ bản
                    </div>
                    <div class="row g-3 mb-4">
                      <div class="col-md-4">
                        <label class="form-label small fw-bold"
                          >Họ và Tên <span class="text-danger">*</span></label
                        >
                        <input
                          type="text"
                          id="fullName"
                          class="form-control form-control-compact"
                          placeholder="Nguyễn Văn A"
                          required
                        />
                      </div>
                      <div class="col-md-4">
                        <label class="form-label small fw-bold"
                          >Email <span class="text-danger">*</span></label
                        >
                        <input
                          type="email"
                          id="email"
                          class="form-control form-control-compact"
                          placeholder="name@example.com"
                          required
                        />
                      </div>
                      <div class="col-md-4">
                        <label class="form-label small fw-bold"
                          >Số điện thoại</label
                        >
                        <input
                          type="text"
                          id="phone"
                          class="form-control form-control-compact"
                          placeholder="09xxxxxxxx"
                        />
                      </div>
                    </div>

                    <div class="group-title fw-bold">
                      <i class="fas fa-key me-2"></i>Thiết lập tài khoản
                    </div>
                    <div class="row g-3 mb-4">
                      <div class="col-md-4">
                        <label class="form-label small fw-bold"
                          >Mật khẩu ban đầu
                          <span class="text-danger">*</span></label
                        >
                        <div class="input-group">
                          <input
                            type="text"
                            id="password"
                            class="form-control form-control-compact"
                            value="123456"
                            required
                          />
                          <span
                            class="input-group-text bg-light border-start-0 py-0"
                            ><i class="fas fa-lock text-muted small"></i
                          ></span>
                        </div>
                      </div>
                      <div class="col-md-4">
                        <label class="form-label small fw-bold">Vai trò</label>
                        <div class="pt-1">
                          <span
                            class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2"
                          >
                            <i class="fas fa-user-graduate me-2"></i>Độc giả hệ
                            thống
                          </span>
                        </div>
                        <input type="hidden" id="roleName" value="user" />
                      </div>
                    </div>

                    <div
                      class="d-flex justify-content-end gap-2 pt-3 border-top"
                    >
                      <a href="reader.html" class="btn btn-sm btn-light px-4"
                        >Hủy</a
                      >
                      <button
                        type="submit"
                        class="btn btn-sm btn-primary px-4 fw-bold shadow-sm"
                      >
                        <i class="fas fa-check-circle me-2"></i>Xác nhận thêm
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="/app/admin/models/reader/ReaderModel.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([
          ComponentLoader.load(
            "sidebar-container",
            "../../components/sidebar.html",
          ),
          ComponentLoader.load(
            "header-container",
            "../../components/header.html",
          ),
        ]);

        setTimeout(() => {
          const link = document.querySelector(
            '#sidebar-wrapper a[href="../reader/reader.html"]',
          );
          if (link) link.classList.add("active");
          const pageTitle = document.getElementById("page-title");
          if (pageTitle) pageTitle.textContent = "Thêm Độc Giả";
        }, 100);

        const model = new ReaderModel();
        document
          .getElementById("addReaderForm")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btnSubmit = e.target.querySelector('button[type="submit"]');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML =
              '<i class="fas fa-spinner fa-spin me-2"></i>Đang xử lý...';

            const requestData = {
              full_name: document.getElementById("fullName").value.trim(),
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
              phone: document.getElementById("phone").value.trim(),
              roleName: document.getElementById("roleName").value,
            };

            try {
              await model.createReader(requestData);
              alert("Thêm thành công!");
              window.location.href = "reader.html";
            } catch (error) {
              alert(error.message);
              btnSubmit.disabled = false;
              btnSubmit.innerHTML =
                '<i class="fas fa-check-circle me-2"></i>Xác nhận thêm';
            }
          });
      });
    </script>
  </body>
</html>
