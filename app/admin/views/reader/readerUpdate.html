<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cập nhật Độc giả - LMS Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="../../../../assets/css/admin/admin-style.css"
    />
    <link
      rel="stylesheet"
      href="../../../../assets/css/admin/reader-style.css"
    />
  </head>
  <body class="bg-light">
    <div class="d-flex" id="wrapper">
      <div id="sidebar-container"></div>
      <div id="page-content-wrapper" class="flex-grow-1">
        <div id="header-container"></div>

        <div class="container-fluid px-4 py-4">
          <div class="d-flex align-items-center mb-4">
            <a
              href="reader.html"
              class="btn btn-white border me-3 shadow-sm py-2 px-3"
            >
              <i class="fas fa-arrow-left"></i>
            </a>
            <div>
              <h3 class="fw-bold mb-0">Cập nhật hồ sơ</h3>
              <p class="text-muted mb-0" id="reader-id-label">
                Đang tải thông tin...
              </p>
            </div>
          </div>

          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-lg-5">
              <form id="updateReaderForm">
                <div class="group-title fw-bold">
                  <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                </div>
                <div class="row g-4 mb-4">
                  <div class="col-md-4">
                    <label class="form-label form-label-standard"
                      >Họ và Tên <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      id="fullName"
                      class="form-control form-control-standard"
                      required
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label form-label-standard"
                      >Email (Không thể sửa)</label
                    >
                    <input
                      type="email"
                      id="email"
                      class="form-control form-control-standard form-control-readonly"
                      readonly
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label form-label-standard"
                      >Số điện thoại</label
                    >
                    <input
                      type="text"
                      id="phone"
                      class="form-control form-control-standard"
                    />
                  </div>
                </div>

                <div class="group-title fw-bold mt-2">
                  <i class="fas fa-key me-2"></i>Tài khoản & Bảo mật
                </div>
                <div class="row g-4 mb-2">
                  <div class="col-md-5">
                    <label class="form-label form-label-standard"
                      >Mật khẩu mới</label
                    >
                    <input
                      type="password"
                      id="password"
                      class="form-control form-control-standard"
                      placeholder="Để trống nếu không muốn đổi"
                    />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label form-label-standard"
                      >Vai trò thẻ</label
                    >
                    <select
                      id="roleName"
                      class="form-select form-control-standard"
                    >
                      <option value="USER">Độc giả (User)</option>
                      <option value="ADMIN">Quản trị viên (Admin)</option>
                    </select>
                  </div>
                </div>

                <div
                  class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top"
                >
                  <a
                    href="reader.html"
                    class="btn btn-light btn-lg px-4 fs-6 fw-medium text-secondary"
                    >Hủy bỏ</a
                  >
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg px-5 fs-6 fw-bold shadow-sm"
                    id="btnSave"
                  >
                    <i class="fas fa-save me-2"></i>Lưu thay đổi
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>

    <script src="/app/admin/models/reader/ReaderModel.js"></script>
    <script src="/app/admin/views/reader/ReaderUpdateView.js"></script>
    <script src="/app/admin/controllers/reader/ReaderController.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // 1. Nạp Sidebar/Header
        await Promise.all([
          ComponentLoader.load(
            "sidebar-container",
            "../../components/sidebar.html",
          ),
          ComponentLoader.load(
            "header-container",
            "../../components/header.html",
          ),
        ]);

        // 2. Khởi tạo MVC
        const model = new ReaderModel();
        const updateView = new ReaderUpdateView();
        const controller = new ReaderController(model, updateView);

        // 3. Chạy logic nạp dữ liệu trang Sửa
        controller.initUpdatePage();

        // 4. Giao diện phụ
        setTimeout(() => {
          const link = document.querySelector(
            '#sidebar-wrapper a[href="../reader/reader.html"]',
          );
          if (link) link.classList.add("active");
          const pageTitle = document.getElementById("page-title");
          if (pageTitle) pageTitle.textContent = "Cập nhật Độc Giả";
        }, 100);
      });
    </script>
  </body>
</html>
