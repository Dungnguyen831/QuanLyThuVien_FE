<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhà xuất bản - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/publisher.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý nhà xuất bản</h3>
                        <p class="text-muted mb-0">Hợp tác và phân phối sách từ các nhà xuất bản</p>
                    </div>
                    <button class="btn btn-primary shadow-sm fw-medium px-4">
                        <i class="fas fa-plus me-2"></i>Thêm nhà xuất bản
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0" placeholder="Tìm tên NXB, mã NXB...">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4 py-3 text-uppercase">MÃ NXB</th>
                                    <th class="text-uppercase">TÊN NHÀ XUẤT BẢN</th>
                                    <th class="text-uppercase">Địa chỉ</th>
                                    <th class="text-uppercase">EMAIL</th>
                                    <th class="text-end pe-4 text-uppercase">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="publisher-table-body">
                                <tr>
                                    <td class="ps-4 fw-bold text-dark">NXB01</td>
                                    <td><div class="fw-bold">NXB Trẻ</div></td>
                                    <td>
                                        <div class="small">tre@nxb.vn</div>
                                        <div class="text-muted small">024.1234.567</div>
                                    </td>
                                    <td>Quận 1, TP.HCM</td>
                                    <td class="fw-bold text-center">250</td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light-primary me-1" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light-danger" title="Xóa"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <p id="total-publishers-count" class="text-muted mb-0">Hiển thị 0 nhà xuất bản</p>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        </ul>
                    </div>
                </div> 
            </div>
        </div>
    </div>
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;"> <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold fs-5" id="deleteModalLabel">Xác nhận xóa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4">
                <p class="mb-0 text-secondary">Bạn có chắc chắn muốn xóa mục này không?</p>
            </div>
            <div class="modal-footer border-top-0 pt-0 justify-content-end pb-4">
                <button type="button" class="btn btn-secondary px-4 py-2 me-2 shadow-sm" 
                        style="background-color: #6c757d; border: none; border-radius: 8px;" 
                        data-bs-dismiss="modal">Hủy</button>
                <button type="button" id="confirmDeleteBtn" class="btn btn-danger px-4 py-2 shadow-sm" 
                        style="background-color: #dc3545; border: none; border-radius: 8px;">Xác nhận xóa</button>
            </div>
        </div>
    </div>
</div>
    <div class="modal fade" id="publisherModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thông tin Nhà xuất bản</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="publisherForm">
                    <input type="hidden" id="publisherId">
                    <div class="mb-3">
                        <label class="form-label">Tên nhà xuất bản</label>
                        <input type="text" class="form-control" id="pubName" placeholder="Nhập tên nhà xuất bản..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text" class="form-control" id="pubEmail" placeholder="Nhập email nhà xuất bản..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" class="form-control" id="pubAddress" placeholder="Nhập địa chỉ nhà xuất bản..." required  >
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Lưu lại</button>
                </form>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="/app/admin/controllers/PublisherController.js"></script>
    <script src="/app/admin/models/PublisherModel.js"></script>
    <script src="/app/admin/views/publisher/PublisherView.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                ComponentLoader.load('sidebar-container', '../../components/sidebar.html'),
                ComponentLoader.load('header-container', '../../components/header.html')
            ]);

            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                // Active menu Nhà xuất bản
                const pubMenu = document.querySelector('#sidebar-wrapper a[href*="publisher.html"]');
                if (pubMenu) pubMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý nhà xuất bản';
            }, 100); 
            // Khởi tạo controller
            if (typeof PublisherController !== 'undefined') {
                const publisherApp = new PublisherController(new PublisherModel(), new PublisherView());
                publisherApp.init();
            }
        });
    </script>
</body>
</html>
