<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sách - LibraryPro</title>
    <link rel="stylesheet" href="../../../../assets/css/admin/book_detail.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <nav class="breadcrumb">
        Home <span>›</span> <span id="category-path">Loading...</span> <span>›</span> <strong id="title-path">...</strong>
    </nav>

    <main class="detail-wrap">
        <aside class="cover-section">
            <div class="book-cover-card">
                <img id="book-img" src="https://via.placeholder.com/300x450" alt="Book Cover">
            </div>
            <div class="cover-buttons">
                <button class="btn-sub">📖 Preview</button>
                <button class="btn-sub">🔗 Share</button>
            </div>
        </aside>

        <section class="info-section">
            <div class="labels">
                <span id="category-label" class="lbl tech text-uppercase">...</span>
                <span id="availability-label" class="lbl available">● ...</span>
            </div>

            <h1 id="book-title" class="main-title">Đang tải...</h1>
            <p id="book-author-year" class="sub-info">...</p>

            <div class="rating-row">
                <div class="stars">★★★★★</div>
                <span class="rating-val">4.8</span>
                <span class="review-link">| <u>1,240 Reviews</u></span>
            </div>

            <p class="book-summary" id="book-desc">
                </p>

            <div class="primary-actions">
                <button id="btn-borrow" class="btn-borrow">🛍️ Borrow Now</button>
                <button class="btn-wishlist">❤️ Add to Wishlist</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <small>ISBN</small>
                    <strong id="book-isbn">...</strong>
                </div>
                <div class="stat-box">
                    <small>PUBLISHED</small>
                    <strong id="book-year">...</strong>
                </div>
                <div class="stat-box">
                    <small>TOTAL QTY</small>
                    <strong id="book-qty">...</strong>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="/app/admin/controllers/BookDetailController.js"></script>
    <script src="/app/admin/models/BookDetailModel.js"></script>
    <script src="/app/admin/views/book/BookDetailView.js"></script>

<script>
    // GIẢ LẬP DATA TỪ FILE SQL CỦA ÔNG
    const mockData = [
        {
            id: 7,
            title: "Java Programming Basics",
            category: "Lập trình",
            author: "Nguyễn Văn A",
            year: 2020,
            isbn: "978604000001",
            total_qty: 10,
            available_qty: 10,
            image: "https://via.placeholder.com/300x450/007bff/ffffff?text=Java+Programming"
        },
        {
            id: 10,
            title: "Machine Learning Fundamentals",
            category: "Trí tuệ nhân tạo",
            author: "Lê Minh C",
            year: 2021,
            isbn: "978604000004",
            total_qty: 7,
            available_qty: 7,
            image: "https://via.placeholder.com/300x450/6f42c1/ffffff?text=AI+Learning"
        }
    ];

    // LOGIC ĐỔ DATA
    function loadBookDetail() {
        // Lấy ID từ URL (ví dụ: book_detail.html?id=7)
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id')) || 7; // Mặc định là ID 7

        const book = mockData.find(item => item.id === bookId);

        if (book) {
            document.getElementById('book-title').innerText = book.title;
            document.getElementById('title-path').innerText = book.title;
            document.getElementById('category-path').innerText = book.category;
            document.getElementById('category-label').innerText = book.category;
            document.getElementById('book-author-year').innerText = `${book.author} • Edition ${book.year}`;
            document.getElementById('book-img').src = book.image;
            document.getElementById('book-isbn').innerText = book.isbn;
            document.getElementById('book-year').innerText = book.year;
            document.getElementById('book-qty').innerText = book.total_qty;
            document.getElementById('availability-label').innerText = `● AVAILABLE: ${book.available_qty} BOOKS`;
            document.getElementById('book-desc').innerText = `Cuốn sách "${book.title}" của tác giả ${book.author} là tài liệu chuyên sâu trong danh mục ${book.category}, giúp người đọc nắm vững các kiến thức nền tảng và nâng cao.`;
        }
    }

    window.onload = loadBookDetail;
    // Khởi tạo controller
            if (typeof BookDetailController !== 'undefined') {
                const bookDetailApp = new BookDetailController(new BookDetailModel(), new BookDetailView());
                bookDetailApp.init();
            }
</script>

</body>
</html>
