<div class="modal fade" id="addBookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold">Thêm sách mới vào kho</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addBookForm">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label small fw-bold text-muted">TÊN SÁCH</label>
                            <input type="text" class="form-control bg-light border-0 py-2" id="bookTitle" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">ISBN</label>
                            <input type="text" class="form-control bg-light border-0 py-2" id="bookIsbn" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">THỂ LOẠI</label>
                            <input class="form-control bg-light border-0 py-2" list="categoryOptions" id="categoryInput" placeholder="Chọn hoặc nhập ID">
                            <datalist id="categoryOptions"></datalist>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">TÁC GIẢ</label>
                            <input class="form-control bg-light border-0 py-2" list="authorOptions" id="authorInput" placeholder="Chọn hoặc nhập ID">
                            <datalist id="authorOptions"></datalist>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">NHÀ XUẤT BẢN</label>
                            <input class="form-control bg-light border-0 py-2" list="publisherOptions" id="publisherInput" placeholder="Chọn hoặc nhập ID">
                            <datalist id="publisherOptions"></datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">NĂM XUẤT BẢN</label>
                            <input type="number" class="form-control bg-light border-0 py-2" id="bookYear" value="2026">
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <div class="d-flex gap-3 align-items-start">
                                <div class="flex-grow-1">
                                    <label class="form-label small fw-bold text-muted mb-1">ẢNH BÌA SÁCH</label>
                                    
                                    <input type="text" class="form-control bg-light border-0 py-2" 
                                           id="bookImageUrl" 
                                           placeholder="Ví dụ: dacnhantam.jpg"
                                           oninput="ImageService.display('imagePreview', this.value)">
                                    
                                    <small class="text-muted d-block mt-1">Nhập tên file (bao gồm đuôi .jpg, .png) </small>

                                    <div class="col-md-12 mb-3">
                                        <label class="form-label small fw-bold text-muted mb-1">MÔ TẢ SÁCH</label>
                                        <textarea class="form-control bg-light border-0 py-2" 
                                                  id="bookDescription" rows="3" 
                                                  placeholder="Nhập tóm tắt nội dung sách..."></textarea>
                                    </div>
                                </div>
                        
                                <div class="flex-shrink-0">
                                    <img id="imagePreview" src="/assets/img/default-book.jpg"  
                                         class="rounded shadow-sm border" 
                                         style="width: 150px; height: 210px; object-fit: cover; background: #fff;"
                                         onerror="this.src='/assets/img/default-book.jpg'">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                        <button type="button" class="btn btn-light fw-medium px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary fw-medium px-4">Lưu thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
