<div class="modal fade" id="bookCopyModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg rounded-4">
            
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold text-primary mb-0"><i class="fas fa-layer-group me-2"></i>Chi tiết bản sao sách</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-4">
                
                <div class="card bg-light border-0 rounded-4 mb-4">
                    <div class="card-body p-3">
                        <div class="row align-items-start g-4">
                            
                            <div class="col-md-7 d-flex gap-4 border-end">
                                
                                <img id="detailBookImage" 
                                src="/assets/img/default-book.jpg"  
                                class="rounded shadow-sm flex-shrink-0 border" 
                                style="width: 100px; height: 140px; object-fit: cover; background: #fff;"
                                onerror="this.src='/assets/img/default-book.jpg'">       

                                <div class="flex-grow-1">
                                    <h4 class="fw-bold mb-1" id="detailBookTitle">...</h4>
                                    <p class="text-muted mb-2 small">Mã hệ thống: <span id="detailBookId" class="badge bg-dark">#</span></p>
                                    
                                    <div class="row g-2 mt-1 small">
                                        <div class="col-6"><b>Tác giả:</b> <span id="detailAuthor" class="ms-1 text-primary"></span></div>
                                        <div class="col-6"><b>Thể loại:</b> <span id="detailCategory" class="ms-1 text-primary"></span></div>
                                        <div class="col-6"><b>Tổng kho:</b> <span id="detailTotal" class="ms-1 fw-bold text-dark">0</span></div>
                                        <div class="col-6"><b>Sẵn có:</b> <span id="detailAvailable" class="ms-1 text-success fw-bold">0</span></div>
                                        <div class="col-6"><strong>ISBN:</strong> <span id="modalBookIsbn" class="ms-1 text-muted">N/A</span></div>
                                        <div class="col-6"><strong>Nhà xuất bản:</strong> <span id="modalBookPublisher" class="ms-1 text-muted">N/A</span></div>
                                        <div class="col-6"><strong>Năm XB:</strong> <span id="modalBookYear" class="ms-1 text-muted">N/A</span></div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-5">
                                <h6 class="fw-bold mb-2"><i class="fas fa-info-circle me-1"></i>Mô tả</h6>
                                <div id="modalBookDescription" class="text-muted fst-italic small bg-white p-3 rounded-3 border" style="max-height: 110px; overflow-y: auto; white-space: pre-line;">
                                    Chưa có mô tả.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card bg-white border rounded-4 mb-4 shadow-sm">
                    <div class="card-body p-3">
                        <div class="row align-items-center g-3">
                            
                            <div class="col-md-6 border-end pe-4">
                                <label class="form-label fw-bold small text-muted mb-2">TÌM KIẾM BẢN SAO</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-search"></i></span>
                                    <input type="text" id="copySearchInput" class="form-control bg-light border-start-0 ps-0" placeholder="Tìm theo ID hoặc Barcode...">
                                </div>
                            </div>

                            <div class="col-md-6 ps-4 d-flex justify-content-between align-items-center">
                                <div>
                                    <label class="form-label fw-bold small text-muted mb-0">TẠO NHANH BẢN SAO</label>
                                    <p class="text-muted mb-0" style="font-size: 0.7rem;">Số lượng bản sao mới</p>
                                </div>
                                <div class="input-group input-group-sm mb-1" style="width: 170px;">
                                    <input type="number" id="bulkQuantity" class="form-control border-light-subtle" value="1" min="1">
                                    <button class="btn btn-primary px-3 fw-medium" id="btnBulkCreate">Tạo</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <h6 class="fw-bold mb-3"><i class="fas fa-list me-2"></i>Danh sách bản sao</h6>
                <div class="table-responsive" style="max-height: 350px;">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th class="ps-3 py-3">ID</th>
                                <th>VỊ TRÍ (SHELF)</th>
                                <th>BARCODE</th>
                                <th>TÌNH TRẠNG</th>
                                <th>TRẠNG THÁI</th>
                                <th class="text-end pe-3">THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="copy-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
