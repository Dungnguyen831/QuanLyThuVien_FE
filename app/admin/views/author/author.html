<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tác giả - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/author.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý tác giả</h3>
                        <p class="text-muted mb-0">Theo dõi và cập nhật thông tin tác giả trong hệ thống</p>
                    </div>
                    <button class="btn btn-primary shadow-sm fw-medium px-4">
                        <i class="fas fa-plus me-2"></i>Thêm tác giả mới
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0" placeholder="Tìm kiếm theo mã, tên tác giả...">
                                </div>
                            </div>
                            <div class="col-md-7 d-flex gap-2 justify-content-end">
                                <select class="form-select bg-light border-0" style="width: 180px;">
                                    <option selected disabled>Quốc tịch</option>
                                    <option>Việt Nam</option>
                                    <option>Nước ngoài</option>
                                </select>
                                <select class="form-select bg-light border-0" style="width: 180px;">
                                    <option selected disabled>Trạng thái</option>
                                    <option>Đang hợp tác</option>
                                    <option>Ngừng hợp tác</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4 py-3">MÃ TG</th>
                                    <th>TÊN TÁC GIẢ</th>
                                    <th>QUỐC TỊCH</th>
                                    <th>SỐ LƯỢNG SÁCH</th>
                                    <th>TRẠNG THÁI</th>
                                    <th class="text-end pe-4">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="author-table-body">
                                <tr>
                                    <td class="ps-4 fw-bold text-dark">TG001</td>
                                    <td><div class="fw-bold">Dale Carnegie</div></td>
                                    <td>Hoa Kỳ</td>
                                    <td class="fw-bold">12</td>
                                    <td>
                                        <span class="status-indicator bg-success"></span>
                                        <span class="text-success fw-medium">Đang hợp tác</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light-primary me-1" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light-danger" title="Xóa"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="p-4 border-top d-flex justify-content-between align-items-center text-muted">
                        <small>Hiển thị <b class="text-dark">1</b> tác giả</small>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        </ul>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                ComponentLoader.load('sidebar-container', '../../components/sidebar.html'),
                ComponentLoader.load('header-container', '../../components/header.html')
            ]);

            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                const authorMenu = document.querySelector('#sidebar-wrapper a[href*="author.html"]');
                if (authorMenu) authorMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý tác giả';
            }, 100); 
        });
    </script>
</body>
</html>
