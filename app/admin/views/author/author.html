<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tác giả - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/author.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý tác giả</h3>
                        <p class="text-muted mb-0">Theo dõi và cập nhật thông tin tác giả trong hệ thống</p>
                    </div>
                    <button class="btn btn-primary shadow-sm fw-medium px-4">
                        <i class="fas fa-plus me-2"></i>Thêm tác giả mới
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0" placeholder="Tìm kiếm theo mã, tên tác giả...">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4 py-3">MÃ TG</th>
                                    <th>TÊN TÁC GIẢ</th>
                                    <th>TIỂU SỬ</th>
                                    <th class="text-end pe-4">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="author-table-body">
                                </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <p id="total-authors-count" class="text-muted mb-0">Hiển thị 0 tác giả</p>
                        
                        <nav aria-label="Page navigation">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            </ul>
                        </nav>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <div class="modal fade" id="authorModal" tabindex="-1" aria-labelledby="modalTitle">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Thêm tác giả</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="authorForm">
                <div class="modal-body">
                    <input type="hidden" id="authorId">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Tên tác giả</label>
                        <input type="text" class="form-control" id="authorName" placeholder="Nhập tên tác giả..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Tiểu sử</label>
                        <textarea class="form-control" id="authorBio" rows="4" placeholder="Mô tả ngắn về tác giả..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" id="btnSaveAuthor" class="btn btn-primary px-4">Xác nhận</button>
                </div>
            </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white border-0">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Xác nhận xóa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <p class="mb-0">Bạn có chắc chắn muốn xóa tác giả này không?</p>
                    <small class="text-muted">Dữ liệu đã xóa sẽ không thể khôi phục lại.</small>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" id="confirmDeleteBtn" class="btn btn-danger px-4">Xóa ngay</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="/app/admin/models/AuthorModel.js"></script>
    <script src="/app/admin/views/author/AuthorView.js"></script>
    <script src="/app/admin/controllers/AuthorController.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                ComponentLoader.load('sidebar-container', '../../components/sidebar.html'),
                ComponentLoader.load('header-container', '../../components/header.html')
            ]);

            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                const authorMenu = document.querySelector('#sidebar-wrapper a[href*="author.html"]');
                if (authorMenu) authorMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý tác giả';
            }, 100); 

            // Chỉ khởi tạo 1 lần duy nhất ở đây
            if (typeof AuthorController !== 'undefined') {
                new AuthorController(new AuthorModel(), new AuthorView());
            }
        });
    </script>
</body>
</html>
