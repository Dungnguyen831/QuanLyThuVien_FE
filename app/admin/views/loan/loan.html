<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý mượn trả - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/loan-style.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý mượn trả</h3>
                        <p class="text-muted mb-0">Theo dõi và xử lý các giao dịch mượn trả sách trong hệ thống</p>
                    </div>
                    <div class="d-flex gap-3">
                        <button class="btn btn-white border shadow-sm fw-medium text-secondary">
                            <i class="fas fa-box-archive me-2"></i>Ghi nhận trả sách
                        </button>
                        <button class="btn btn-primary shadow-sm fw-medium">
                            <i class="fas fa-plus me-2"></i>Tạo phiếu mượn mới
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <div class="input-group" style="width: 320px;">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-0" placeholder="Tìm kiếm theo tên độc giả hoặc mã sách...">
                        </div>
                        
                        <div class="filter-tabs">
                            <div class="filter-tab active">Tất cả</div>
                            <div class="filter-tab">Đang mượn</div>
                            <div class="filter-tab">Đã trả</div>
                            <div class="filter-tab">Quá hạn</div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover table-custom align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4 py-3">MÃ PHIẾU</th>
                                    <th class="py-3">ĐỘC GIẢ</th>
                                    <th class="py-3" style="width: 15%;">TÊN SÁCH</th>
                                    <th class="py-3">NGÀY MƯỢN</th>
                                    <th class="py-3">HẸN TRẢ</th>
                                    <th class="py-3">NGÀY TRẢ</th>
                                    <th class="py-3">TRẠNG THÁI</th>
                                    <th class="text-end pe-4 py-3">HÀNH ĐỘNG</th>
                                </tr>
                            </thead>
                            <tbody id="loan-table-body">
                                <tr>
                                    <td colspan="8" class="text-center py-4 text-muted">
                                        <i class="fas fa-spinner fa-spin me-2"></i> Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="p-4 border-top d-flex justify-content-between align-items-center text-muted">
                        <small>Hiển thị <b class="text-dark">1</b> đến <b class="text-dark">6</b> trong tổng số <b class="text-dark">128</b> kết quả</small>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#">3</a></li>
                            <li class="page-item"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../../../../assets/js/ComponentLoader.js"></script>

    <script src="/app/admin/controllers/LoanController.js"></script>
    <script src="/app/admin/models/LoanModel.js"></script>
    <script src="/app/admin/views/loan/LoanView.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ComponentLoader.load('sidebar-container', '../../components/sidebar.html');
            ComponentLoader.load('header-container', '../../components/header.html');
            
            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                // Cập nhật lại đường dẫn thẻ a cho đúng
                const loanMenu = document.querySelector('#sidebar-wrapper a[href="../loan/loan.html"]');
                if (loanMenu) loanMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý mượn trả';
            }, 100); 

            // Khởi tạo controller
            if (typeof LoanController !== 'undefined') {
                const loanApp = new LoanController(new LoanModel(), new LoanView());
                loanApp.init();
            }
        });
    </script>
</body>
</html>
