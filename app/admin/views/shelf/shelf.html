<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Kệ sách - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/shelf.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý kệ sách</h3>
                        <p class="text-muted mb-0">Tối ưu không gian lưu trữ và vị trí sách trong thư viện</p>
                    </div>
                    <button class="btn btn-primary shadow-sm fw-medium px-4">
                        <i class="fas fa-plus me-2"></i>Thêm kệ sách
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0" placeholder="Tìm tên kệ, vị trí...">
                                </div>
                            </div>
                            <div class="col-md-7 d-flex gap-2 justify-content-end">
                                <select class="form-select bg-light border-0" style="width: 150px;">
                                    <option selected disabled>Tầng</option>
                                    <option>Tầng 1</option>
                                    <option>Tầng 2</option>
                                    <option>Tầng 3</option>
                                </select>
                                <select class="form-select bg-light border-0" style="width: 180px;">
                                    <option selected disabled>Trạng thái</option>
                                    <option>Hoạt động</option>
                                    <option>Ngưng hoạt động</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4 py-3 text-uppercase">MÃ KỆ</th>
                                    <th class="text-uppercase">TÊN KỆ</th>
                                    <th class="text-uppercase">VỊ TRÍ</th>
                                    <th class="text-uppercase">SỨC CHỨA</th>
                                    <th class="text-uppercase">TRẠNG THÁI</th>
                                    <th class="text-end pe-4 text-uppercase">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="shelf-table-body">
                                <tr>
                                    <td class="ps-4 fw-bold text-dark">A1</td>
                                    <td><div class="fw-bold text-primary">Kệ sách A1</div></td>
                                    <td>
                                        <div class="small fw-medium">Tầng 1</div>
                                        <div class="text-muted small">Khu vực gần cửa chính</div>
                                    </td>
                                    <td>
                                        <div class="progress" style="height: 6px; width: 100px;">
                                            <div class="progress-bar bg-success" style="width: 65%"></div>
                                        </div>
                                        <small class="text-muted">120 quyển</small>
                                    </td>
                                    <td>
                                        <span class="status-indicator bg-success"></span>
                                        <span class="text-success fw-medium">Hoạt động</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light-primary me-1" title="Sửa"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light-danger" title="Xóa"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="p-4 border-top d-flex justify-content-between align-items-center text-muted">
                        <small>Hiển thị <b class="text-dark">1</b> kệ sách</small>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        </ul>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="/app/admin/controllers/ShelfController.js"></script>
    <script src="/app/admin/models/ShelfModel.js"></script>
    <script src="/app/admin/views/shelf/ShelfView.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                ComponentLoader.load('sidebar-container', '../../components/sidebar.html'),
                ComponentLoader.load('header-container', '../../components/header.html')
            ]);
            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                const shelfMenu = document.querySelector('#sidebar-wrapper a[href*="shelf.html"]');
                if (shelfMenu) shelfMenu.classList.add('active');
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý kệ sách';
            }, 100); 
            // Khởi tạo controller
            if (typeof ShelfController !== 'undefined') {
                const shelfApp = new ShelfController(new ShelfModel(), new ShelfView());
                shelfApp.init();
            }
        });
    </script>
</body>
</html>
