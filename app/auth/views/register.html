<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Modern UI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../../assets/css/auth/register.css" />
  </head>

  <body>
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">Tạo Tài Khoản</h1>
        <p class="form-subtitle">Vui lòng nhập thông tin của bạn để đăng ký.</p>
      </div>

      <form id="register-form">
        <div class="input-group">
          <label>Họ và Tên</label>
          <div class="input-field">
            <i data-lucide="user" class="input-icon"></i>
            <input type="text" name="fullName" placeholder="John Doe" />
          </div>
          <span class="error-message"></span>
        </div>

        <div class="input-group">
          <label>Email</label>
          <div class="input-field">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="email" name="email" placeholder="john@example.com" />
          </div>
          <span class="error-message"></span>
        </div>

        <div class="input-group">
          <label>Số Điện Thoại</label>
          <div class="input-field">
            <i data-lucide="phone" class="input-icon"></i>
            <input type="text" name="phone" placeholder="+1 (555) 000-0000" />
          </div>
          <span class="error-message"></span>
        </div>

        <div class="input-group">
          <label>Mật Khẩu</label>
          <div class="input-field">
            <i data-lucide="lock" class="input-icon"></i>
            <input
              type="password"
              class="password"
              name="password"
              placeholder="••••••••"
            />
            <button type="button" class="toggle-password">👁️</button>
          </div>
          <span class="error-message"></span>
        </div>

        <div class="input-group">
          <label>Xác Nhận Mật Khẩu</label>
          <div class="input-field">
            <i data-lucide="rotate-ccw" class="input-icon"></i>
            <input
              type="password"
              id="confirm_password"
              class="password"
              name="confirm_password"
              placeholder="••••••••"
            />
            <button type="button" class="toggle-password">👁️</button>
          </div>
          <span class="error-message"></span>
        </div>
        <button type="submit" class="submit-btn">
          Tạo Tài Khoản
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <p class="login-prompt">
        Đã có tài khoản?
        <a href="../../auth/views/login.html">Đăng nhập ngay</a>
      </p>
    </div>

    <script src="../models/AuthModel.js"></script>
    <script src="AuthView.js"></script>
    <script src="../controllers/AuthController.js"></script>
    <script src="registerValidation.js"></script>
    <script>
      lucide.createIcons({
        attrs: {
          "stroke-width": 1.5,
        },
      });
      const app = new AuthController(new AuthModel(), new AuthView());
      document.querySelectorAll(".toggle-password").forEach((button) => {
        button.addEventListener("click", function () {
          const passwordInput = this.previousElementSibling;
          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            this.innerHTML = "🙈";
          } else {
            passwordInput.type = "password";
            this.innerHTML = "👁️";
          }
        });
      });
    </script>
  </body>
</html>
