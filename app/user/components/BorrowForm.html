<!-- Borrow Form Template -->
<!-- Simplified form for borrowing a single book -->
<template id="borrow-form-template">
    <div class="borrow-modal-overlay">
        <div class="borrow-modal">
            <div class="modal-header">
                <h2 class="modal-title">📚 Borrow Book</h2>
                <button class="modal-close-btn" type="button" title="Close">
                    <span>&times;</span>
                </button>
            </div>

            <form id="borrow-form" class="borrow-form">
                <!-- Book Selection (dropdown mode) -->
                <div class="form-group" id="book-select-group" style="display:none;">
                    <label for="book-select">Select Book <span class="required">*</span></label>
                    <select id="book-select" name="bookSelect" class="form-control">
                        <option value="">-- Choose a book --</option>
                    </select>
                </div>

                <!-- Book Title (display mode - single book) -->
                <div class="form-group" id="book-title-group">
                    <label for="book-title-display">Book Title</label>
                    <input type="text" id="book-title-display" class="form-control" readonly>
                    <input type="hidden" id="book-id" name="bookId" value="">
                </div>

                <!-- Pickup Date -->
                <div class="form-group">
                    <label for="pickup-date">Desired Pickup Date <span class="required">*</span></label>
                    <input type="date" id="pickup-date" name="pickupDate" required class="form-control">
                    <small class="form-text">When would you like to pick up this book? (Scheduled for 9:00 AM)</small>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        ✓ Confirm Borrow
                    </button>
                    <button type="button" class="btn btn-secondary close-modal-btn">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</template>
