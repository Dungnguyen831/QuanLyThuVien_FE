<!-- Reservation Form Template -->
<!-- Used for both CREATE (new reservation) and UPDATE (edit reservation) modes -->
<template id="reservation-form-template">
    <div class="reservation-modal-overlay">
        <div class="reservation-modal">
            <div class="modal-header">
                <h2 class="modal-title">{modalTitle}</h2>
                <button class="modal-close-btn" type="button" title="Đóng">
                    <span>&times;</span>
                </button>
            </div>

            <form id="reservation-form" class="reservation-form">
                <!-- Book Selection (only for CREATE mode) -->
                {bookSelector}

                <!-- Reservation Date (Pickup Date) -->
                <div class="form-group">
                    <label for="pickup-date">Ngày lấy sách mong muốn <span class="required">*</span></label>
                    <input type="date" id="pickup-date" name="pickupDate" value="{pickupDate}" required
                        class="form-control">
                    <small class="form-text">Bạn muốn lấy sách này vào ngày nào? (Dự kiến lúc 9:00 AM)</small>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        {submitButtonText}
                    </button>
                    <button type="button" class="btn btn-secondary close-modal-btn">
                        Hủy
                    </button>
                </div>
            </form>
        </div>
    </div>
</template>
