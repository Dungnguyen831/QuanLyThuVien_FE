<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử mượn trả - LibrarySaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../../assets/css/user/style.css" />
    <link rel="stylesheet" href="../../../../assets/css/user/loan_user_styles.css" />
  </head>

  <body>
    <div id="navbar-container"></div>

    <div id="page-loading" class="loading-overlay" style="display: none;">
      <div class="spinner"></div>
    </div>

    <div class="loans-banner">
      <div class="banner-content">
        <h1 class="loans-title">Lịch sử mượn trả</h1>
        <p class="loans-subtitle">
          Theo dõi chi tiết các giao dịch mượn trả sách của bạn trong hệ thống.
        </p>
      </div>
    </div>

    <main class="main-container">
      <div class="loans-table-section">
        <div class="table-header">
          <h2 class="section-title">Danh sách phiếu mượn</h2>
        </div>

        <div class="table-responsive">
          <table class="loans-table">
            <thead>
              <tr>
                <th width="15%">MÃ PHIẾU</th>
                <th width="35%">TÊN SÁCH</th>
                <th width="15%">NGÀY TRẢ</th>
                <th width="20%">TRẠNG THÁI</th>
                <th width="15%" style="text-align: right;">HÀNH ĐỘNG</th>
              </tr>
            </thead>
            <tbody id="loan-table-body">
              <tr>
                <td colspan="5" style="text-align: center; padding: 20px;">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <div class="modal fade" id="loanDetailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-light">
            <h5 class="modal-title fw-bold text-primary">
              <i class="fas fa-info-circle me-2"></i>Chi tiết mượn sách
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            
            <div class="mb-3">
              <label class="fw-bold text-muted small text-uppercase">Mã vạch sách (Barcode)</label>
              <div id="modal-barcode" class="fs-5 fw-bold text-dark" style="letter-spacing: 1px;">-</div>
            </div>

            <div class="mb-3">
              <label class="fw-bold text-muted small text-uppercase">Ngày mượn</label>
              <div id="modal-borrow-date" class="text-dark">-</div>
            </div>

            <div class="mb-0">
              <label class="fw-bold text-muted small text-uppercase">Ghi chú phiếu mượn</label>
              <div id="modal-note" class="p-3 bg-light border rounded-3 text-secondary" style="min-height: 60px; font-style: italic;">
                -
              </div>
            </div>

          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          </div>
        </div>
      </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../../../assets/js/auth.js"></script>
    <script src="../../models/user_loan/UserLoanModel.js"></script>
    <script src="../../views/loans/UserLoanView.js"></script> <script src="../../controllers/user_loan/UserLoanController.js"></script>

    <script>
      // Load navbar
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
        });

      // Khởi tạo MVC khi DOM sẵn sàng
      document.addEventListener("DOMContentLoaded", function () {
          const model = new UserLoanModel();
          const view = new UserLoanView();
          const controller = new UserLoanController(model, view);
      });
    </script>
  </body>
</html>
