<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi Mật Khẩu - LibrarySaaS</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="../../../../assets/css/user/style.css" />
    <link rel="stylesheet" href="../../../../assets/css/user/profile.css" />
  </head>

  <body>
    <div id="navbar-container"></div>

    <div class="profile-page-wrapper">
      <div class="profile-card profile-card-compact">
        <div class="profile-banner profile-banner-sm"></div>

        <div class="profile-body">
          <div class="avatar-section">
            <div class="avatar-circle avatar-circle-inverse">
              <i class="fas fa-lock"></i>
            </div>
            <h4 class="avatar-name">Đổi Mật Khẩu</h4>
          </div>

          <form id="changePasswordForm" onsubmit="return false;">
            <div class="form-group-stack">
              <div class="form-group">
                <label class="form-label"
                  >Mật khẩu hiện tại <span class="text-danger">*</span></label
                >
                <input
                  id="oldPassword"
                  type="password"
                  name="oldPassword"
                  class="form-control"
                  placeholder="Nhập mật khẩu cũ..."
                />
                <span class="error-message pwd-error-msg"></span>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Mật khẩu mới <span class="text-danger">*</span></label
                >
                <input
                  id="newPassword"
                  type="password"
                  name="newPassword"
                  class="form-control"
                  placeholder="Ít nhất 8 ký tự..."
                />
                <span class="error-message pwd-error-msg"></span>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Xác nhận mật khẩu mới
                  <span class="text-danger">*</span></label
                >
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-control"
                  placeholder="Nhập lại mật khẩu mới..."
                />
                <span class="error-message pwd-error-msg"></span>
              </div>
            </div>

            <div class="action-buttons action-buttons-vertical">
              <button
                type="button"
                id="btnSubmitPassword"
                class="btn-custom btn-fill btn-full-width"
              >
                Cập nhật mật khẩu
              </button>

              <a
                href="profile.html"
                class="btn-custom btn-light-custom btn-full-width"
              >
                <i class="fas fa-arrow-left"></i> Quay lại hồ sơ
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../../../../assets/js/passwordValidator.js"></script>
    <script src="../../controllers/profile/ProfileController.js"></script>
    <script src="../../views/profile/changePasswordView.js"></script>
    <script src="../../../admin/models/reader/ReaderModel.js"></script>
    <script src="../../../../assets/js/auth.js"></script>
    <script>
      // Load Navbar
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
        });

      // Khởi tạo Controller
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof ProfileController !== "undefined") {
          const app = new ProfileController(
            new ReaderModel(),
            new ChangePasswordView(),
          );
          app.init();
        }
      });
    </script>
  </body>
</html>
