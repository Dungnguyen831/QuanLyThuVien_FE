<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách yêu thích - LibrarySaaS</title>
  <link rel="stylesheet" href="../../../../assets/css/user/style.css" />
  <link rel="stylesheet" href="../../../../assets/css/user/wishlist.css" />
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>

<body>
  <!-- Navigation Bar -->
  <div id="navbar-container"></div>

  <!-- Loading Indicator -->
  <div id="page-loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Main Container -->
  <main class="main-container">
    <!-- Breadcrumb Navigation -->

    <!-- Page Header -->
    <div class="wishlist-header">
      <div class="header-content">
        <div class="header-info">
          <h1 class="wishlist-title">Danh sách yêu thích của tôi</h1>
          <p class="wishlist-subtitle" id="wishlist-subtitle">
            Bạn có 0 mục được lưu để khám phá sau.
          </p>
        </div>
        <button class="btn btn-primary btn-lg" id="borrow-all-btn">
          Mượn tất cả sách có sẵn
        </button>
      </div>
    </div>

    <!-- Filter and Sort Controls -->
    <div class="wishlist-controls">
      <div class="filter-pills">
        <button class="filter-pill active" data-filter="all">
          Tất cả mục
        </button>
        <button class="filter-pill" data-filter="available">
          Available Now
        </button>
        <button class="filter-pill" data-filter="ebooks">Sách điện tử</button>
        <button class="filter-pill" data-filter="audiobooks">
          Sách âm thanh
        </button>
      </div>

      <div class="sort-controls">
        <span class="sort-label">SẮP XẾP THEO</span>
        <select class="sort-dropdown" id="sort-dropdown">
          <option value="date-added">Date Added</option>
          <option value="title">Title (A-Z)</option>
          <option value="author">Author (A-Z)</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
    </div>

    <!-- Books Grid Container -->
    <div class="wishlist-grid-container">
      <div class="books-grid" id="wishlist-grid">
        <!-- Book cards will be rendered here by WishlistView.js -->
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination-container">
      <button class="pagination-btn pagination-prev" id="pagination-prev" title="Trang trước">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <div class="pagination-numbers" id="pagination-numbers">
        <!-- Page number buttons will be rendered here -->
      </div>

      <button class="pagination-btn pagination-next" id="pagination-next" title="Trang tiếp theo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="8" height="8" fill="#6366F1" />
          <rect x="14" y="2" width="8" height="8" fill="#6366F1" />
          <rect x="14" y="14" width="8" height="8" fill="#6366F1" />
        </svg>
        <span>LibrarySaaS</span>
      </div>
      <div class="footer-links">
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Help Center</a>
        <a href="#" class="footer-link">Contact</a>
      </div>
      <p class="footer-copyright">
        © 2024 LibrarySaaS Inc. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <!-- Shared ImageService for image handling -->
  <script src="../../../../assets/js/ImageService.js"></script>

  <script src="../../../../assets/js/auth.js"></script>
  <script src="../../models/WishlistModel.js"></script>
  <script src="../../controllers/BookCardController.js"></script>
  <script src="../../components/BookCard.js"></script>
  <script src="./WishlistView.js"></script>
  <script src="../../controllers/WishlistController.js"></script>
  <script>
    // Load navbar component
    fetch("../../components/navbar.html")
      .then((response) => response.text())
      .then((html) => {
        document.getElementById("navbar-container").innerHTML = html;
      });

    // Initialize the wishlist page when DOM is ready
    document.addEventListener("DOMContentLoaded", function () {
      const wishlistModel = new WishlistModel();
      const wishlistView = new WishlistView();
      const wishlistController = new WishlistController(
        wishlistModel,
        wishlistView,
      );
    });
  </script>
</body>

</html>
